name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # required for the PR comment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        # Findings are detected and summarised, but the check is allowed to pass
        # during the org-wide rollout; the PR comment still posts on failure.
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
