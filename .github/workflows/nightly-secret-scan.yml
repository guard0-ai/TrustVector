name: Nightly Secret Scan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # SLACK_WEBHOOK_URL also lifted to env so we can gate steps via `if:`
      # (secrets.* is forbidden in `if:`). Still passed as `with:` to the
      # Slack action — env alone doesn't populate its inputs.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # Cap on per-finding rows in annotations / Step Summary / log table.
      MAX_FINDING_ROWS: '100'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # install.sh SHA-pinned (bootstrap reproducible); binary floats to
      # latest release (fresh detectors). install.sh sha256-verifies the
      # tarball before installing, so the float doesn't lose integrity.
      - name: Install TruffleHog binary (latest)
        env:
          INSTALL_SH_SHA: f37f2eff68c31620fd88bc37ff2b7d57ea0c700c
        run: |
          curl -sSfL "https://raw.githubusercontent.com/trufflesecurity/trufflehog/${INSTALL_SH_SHA}/scripts/install.sh" \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      # Runs the binary once, parses JSON, emits all four triage surfaces.
      # Never reads .Raw / .RawV2 — commit+file:line is enough for triage.
      - name: Scan and emit triage surfaces
        id: findings
        run: |
          trufflehog git file://. --only-verified --no-update --json > findings.jsonl || true
          if [ ! -s findings.jsonl ]; then
            {
              echo "has_findings=false"
              echo "has_verified=false"
              echo "extraction_failed=false"
            } >> "$GITHUB_OUTPUT"
            echo "No findings."
            exit 0
          fi

          python3 <<'PYEOF'
          import json, os, sys, re
          from collections import Counter
          from urllib.parse import quote

          REPO = os.environ['GITHUB_REPOSITORY']
          RUN_ID = os.environ['GITHUB_RUN_ID']
          RUNNER_TEMP = os.environ['RUNNER_TEMP']
          MAX_ROWS = int(os.environ.get('MAX_FINDING_ROWS', '100'))
          SLACK_PAYLOAD = os.path.join(RUNNER_TEMP, 'slack-payload.json')

          def parse(line):
              try:
                  obj = json.loads(line)
              except json.JSONDecodeError:
                  return None
              g = obj.get('SourceMetadata', {}).get('Data', {}).get('Git')
              if not g:
                  return None
              # TruffleHog's git source uses 'email' for the "Name <email>" line.
              return {
                  'detector':  obj.get('DetectorName', 'unknown'),
                  'verified':  bool(obj.get('Verified', False)),
                  'commit':    g.get('commit', '') or '',
                  'file':      g.get('file', '?'),
                  'line':      g.get('line', 0) or 0,
                  'timestamp': g.get('timestamp', '') or '',
                  'committer': g.get('email', '') or '',
              }

          findings = []
          with open('findings.jsonl') as fp:
              for line in fp:
                  line = line.strip()
                  if not line:
                      continue
                  f = parse(line)
                  if f:
                      findings.append(f)

          total = len(findings)
          verified_count = sum(1 for f in findings if f['verified'])

          def short_committer(s):
              return re.sub(r' <.*$', '', s).strip() or 'unknown'

          def emit_outputs(has_findings, has_verified, extraction_failed, **kw):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fp:
                  fp.write(f"has_findings={'true' if has_findings else 'false'}\n")
                  fp.write(f"has_verified={'true' if has_verified else 'false'}\n")
                  fp.write(f"extraction_failed={'true' if extraction_failed else 'false'}\n")
                  for k, v in kw.items():
                      fp.write(f"{k}={v}\n")

          # Fallback: trufflehog wrote output but no parseable git-source rows.
          if total == 0:
              print("::warning::TruffleHog produced output but no parseable git-source findings.")
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as fp:
                  fp.write("## ⚠ TruffleHog — output present, but no parseable git-source findings\n\n")
                  fp.write("Re-run TruffleHog locally with `--json` for full triage data.\n")
              slack_payload = {
                  "text": f"⚠ TruffleHog extraction failed in {REPO}",
                  "blocks": [
                      {"type": "header", "text": {"type": "plain_text", "text": "⚠ TruffleHog: extraction failed", "emoji": True}},
                      {"type": "section", "text": {"type": "mrkdwn", "text": f"TruffleHog produced output in `{REPO}` but no parseable git-source rows. Investigate the workflow run."}},
                      {"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": "View Workflow Run"}, "url": f"https://github.com/{REPO}/actions/runs/{RUN_ID}", "style": "danger"}]},
                  ],
              }
              with open(SLACK_PAYLOAD, 'w') as fp:
                  json.dump(slack_payload, fp)
              emit_outputs(has_findings=False, has_verified=False, extraction_failed=True,
                           total=0, unique_commits=0, verified_count=0)
              sys.exit(0)

          # Verified rows first, then by timestamp. Keeps incidents on top in
          # ad-hoc audit mode where unverified pattern matches are also present.
          findings.sort(key=lambda x: (not x['verified'], x['timestamp']))
          unique_commits = len({f['commit'] for f in findings if f['commit']})
          detector_counts = Counter(f['detector'] for f in findings).most_common()

          unverified_count = total - verified_count
          summary_line = f"{verified_count} verified" + (f" / {unverified_count} unverified" if unverified_count else "")

          # Surface 1: structured table → run log (stdout)
          print(f"=== TruffleHog findings — {summary_line}, across {unique_commits} unique commits ===")
          print()
          print(f"{'#':<4} {'Ver':<4} {'Detector':<15} {'Commit':<10} {'File:line':<60} {'Committed-at':<18} {'Committer'}")
          print('-' * 134)
          for i, f in enumerate(findings[:MAX_ROWS], 1):
              loc = f"{f['file']}:{f['line']}"
              v = '✓' if f['verified'] else '✗'
              print(f"{i:<4} {v:<4} {f['detector']:<15} {f['commit'][:8]:<10} {loc[:60]:<60} {f['timestamp'][:16]:<18} {short_committer(f['committer'])}")
          if total > MAX_ROWS:
              print(f"... + {total - MAX_ROWS} more (capped at {MAX_ROWS}; re-run TruffleHog locally for the full list)")
          print()
          print("=== By detector ===")
          for det, cnt in detector_counts:
              print(f"  {det}: {cnt}")
          print()
          print("=== Unique commits to inspect ===")
          seen = set()
          for f in findings:
              c = f['commit']
              if c and c not in seen:
                  seen.add(c)
                  print(f"  https://github.com/{REPO}/commit/{c}")

          # Surface 2: ::warning:: workflow commands → annotations panel.
          # Only verified findings get annotations (signal vs noise in the panel).
          # Ad-hoc auditors get unverified rows via the Step Summary / log table.
          def wc_esc(s):
              return (str(s)
                      .replace('%', '%25')
                      .replace('\r', '%0D')
                      .replace('\n', '%0A')
                      .replace(':', '%3A')
                      .replace(',', '%2C'))
          verified_findings = [f for f in findings if f['verified']]
          for f in verified_findings[:MAX_ROWS]:
              title = f"{f['detector']} @ {f['commit'][:8]}"
              msg = f"Committed {f['timestamp'][:10] or 'unknown'} by {short_committer(f['committer'])}"
              print(f"::warning file={wc_esc(f['file'])},line={f['line']},title={wc_esc(title)}::{wc_esc(msg)}")

          # Surface 3: Step Summary (markdown) → top of run page
          def cell(s):
              return str(s).replace('|', '\\|')
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as fp:
              if verified_count:
                  fp.write(f"## 🚨 TruffleHog — {verified_count} verified live secret{'s' if verified_count != 1 else ''}\n\n")
              else:
                  fp.write(f"## TruffleHog — {total} unverified pattern matches\n\n")
              fp.write(f"**{summary_line}** · **{unique_commits}** unique commits affected\n\n")
              fp.write("### By detector\n\n")
              for det, cnt in detector_counts:
                  fp.write(f"- `{cell(det)}` × {cnt}\n")
              fp.write("\n### Findings\n\n")
              fp.write("| # | Verified | Detector | Commit | File:line | Committed-at | Committer |\n")
              fp.write("|---|---|---|---|---|---|---|\n")
              for i, f in enumerate(findings[:MAX_ROWS], 1):
                  c = f['commit']
                  file_path = f['file']
                  loc = f"{file_path}:{f['line']}"
                  commit_url = f"https://github.com/{REPO}/commit/{c}"
                  file_url = f"https://github.com/{REPO}/blob/{c}/{quote(file_path, safe='/')}#L{f['line']}"
                  v = '✓' if f['verified'] else '✗'
                  fp.write(f"| {i} | {v} | `{cell(f['detector'])}` | [{c[:8]}]({commit_url}) | [{cell(loc)}]({file_url}) | {cell(f['timestamp'][:16])} | {cell(short_committer(f['committer']))} |\n")
              if total > MAX_ROWS:
                  fp.write(f"\n_{total - MAX_ROWS} more findings truncated (cap {MAX_ROWS}). Re-run TruffleHog locally with `--json` for the full list._\n")

          # Surface 4: Slack payload — only built when there's something to page
          # on (verified finding). Unverified-only audit runs surface data via
          # Step Summary + log table; no Slack noise.
          if verified_count:
              breakdown_lines = "\n".join(f"• `{det}` × {cnt}" for det, cnt in detector_counts)
              fields = [
                  {"type": "mrkdwn", "text": f"*Repository:*\n{REPO}"},
                  {"type": "mrkdwn", "text": f"*Verified:*\n{verified_count}"},
                  {"type": "mrkdwn", "text": f"*Unique commits:*\n{unique_commits}"},
              ]
              if unverified_count:
                  fields.append({"type": "mrkdwn", "text": f"*Unverified (audit):*\n{unverified_count}"})
              slack_payload = {
                  "text": f"🚨 {verified_count} verified live secrets in {REPO}",
                  "blocks": [
                      {"type": "header", "text": {"type": "plain_text", "text": "🚨 Verified live secrets in git history", "emoji": True}},
                      {"type": "section", "fields": fields},
                      {"type": "section", "text": {"type": "mrkdwn", "text": f"*By detector*\n{breakdown_lines}"}},
                      {"type": "section", "text": {"type": "mrkdwn", "text": "*What this means:* TruffleHog authenticated each candidate against the provider's live API. Findings are real credentials. Full triage details on the workflow run page — Step Summary, annotations, *Scan* step log."}},
                      {"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": "View Workflow Run"}, "url": f"https://github.com/{REPO}/actions/runs/{RUN_ID}", "style": "danger"}]},
                  ],
              }
              with open(SLACK_PAYLOAD, 'w') as fp:
                  json.dump(slack_payload, fp)

          emit_outputs(has_findings=True,
                       has_verified=verified_count > 0,
                       extraction_failed=False,
                       total=total,
                       unique_commits=unique_commits,
                       verified_count=verified_count)
          PYEOF

      # Page on either a real incident (verified finding) or a tool failure
      # (TruffleHog produced output we couldn't parse). Both warrant attention;
      # the Slack payload distinguishes them.
      - name: Notify Slack
        if: ${{ (steps.findings.outputs.has_verified == 'true' || steps.findings.outputs.extraction_failed == 'true') && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: ${{ runner.temp }}/slack-payload.json

      - name: Fail job
        if: ${{ steps.findings.outputs.has_verified == 'true' || steps.findings.outputs.extraction_failed == 'true' }}
        run: |
          echo "::error::TruffleHog: verified findings or extraction failure. See Step Summary, annotations, and the 'Scan' step's log."
          exit 1
